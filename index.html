<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dena - Pawna</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
  text-align:center;
}

.container{
  width:90%;
  max-width:500px;
  margin:40px auto;
  background:#1c1c1c;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.7);
}

h2{
  margin-bottom:15px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th{
  background:#111;
  color:#ffd700;
  padding:12px;
}

td{
  background:#222;
  padding:12px;
  font-size:15px;
  transition:0.3s ease;
}

/* 🔥 FULL ROW HOVER EFFECT */
tr{
  transition:0.3s ease;
  cursor:pointer;
}

tr:hover{
  transform:scale(1.05);
  background:#333 !important;
  box-shadow:0 0 15px rgba(255,215,0,0.3);
}

/* MOBILE */
@media (max-width:600px){
  th,td{
    font-size:13px;
    padding:10px;
  }

  tr:hover{
    transform:scale(1.02);
  }

  .container{
    margin:20px auto;
    padding:15px;
  }
}
</style>
</head>

<body>

<div class="container">

<h2>Dena - Pawna</h2>

<table>
<thead>
<tr>
  <th>Name</th>
  <th>Amount</th>
  <th>Relationship</th>
</tr>
</thead>

<tbody>

<tr>
  <td>Dewan Mahmud Mahin</td>
  <td>1500</td>
  <td>Cousin</td>
</tr>

<tr>
  <td>TBA</td>
  <td>TBA</td>
  <td>TBA</td>
</tr>

<tr>
  <td>TBA</td>
  <td>TBA</td>
  <td>TBA</td>
</tr>

<tr>
  <td>TBA</td>

  <td>TBA</td>
</tr>

</tbody>
</table>

</div>

</body>
</html>
